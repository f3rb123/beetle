services:
  backend:
    build: ./backend
    container_name: cortex-backend
    volumes:
      - cortex-uploads:/tmp/cortex
      - cortex-data:/data

    environment:
      - MAX_UPLOAD_SIZE=200
      - CORTEX_DATA_DIR=/data
      - JADX_PATH=/opt/jadx/bin/jadx
      - APKTOOL_PATH=/usr/local/bin/apktool

      # Cap the jadx JVM heap (jadx only — does not affect apktool or any other tool)
      - CORTEX_JADX_HEAP=4g

      # Writable HOME/XDG base for jadx runtime state
      - CORTEX_JADX_STATE_DIR=/tmp/jadx

      # AI providers
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}

    restart: unless-stopped

    # Resource limits
    mem_limit: ${CORTEX_BACKEND_MEM:-6g}
    memswap_limit: ${CORTEX_BACKEND_MEM:-6g}
    cpus: ${CORTEX_BACKEND_CPUS:-4.0}
    pids_limit: 512

    # Drop all Linux capabilities
    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    read_only: true

    tmpfs:
      - /tmp:size=2g,mode=1777

  frontend:
    build: ./frontend
    container_name: cortex-frontend

    ports:
      - "9005:80"

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped
    mem_limit: ${CORTEX_FRONTEND_MEM:-256m}
    cpus: ${CORTEX_FRONTEND_CPUS:-1.0}
    pids_limit: 128

    security_opt:
      - no-new-privileges:true

volumes:
  cortex-uploads:
  cortex-data: