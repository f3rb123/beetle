services:
  backend:
    build: ./backend
    container_name: cortex-backend

    volumes:
      - cortex-uploads:/tmp/cortex
      - cortex-data:/data

    environment:
      # Core configuration
      - MAX_UPLOAD_SIZE=200
      - CORTEX_DATA_DIR=/data
      - JADX_PATH=/opt/jadx/bin/jadx
      - APKTOOL_PATH=/usr/local/bin/apktool

      # JADX
      - CORTEX_JADX_HEAP=4g
      - CORTEX_JADX_STATE_DIR=/tmp/jadx

      # AI Providers
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}

      # Threat Intelligence
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}

    restart: unless-stopped

    # Resource limits
    mem_limit: ${CORTEX_BACKEND_MEM:-6g}
    memswap_limit: ${CORTEX_BACKEND_MEM:-6g}
    cpus: ${CORTEX_BACKEND_CPUS:-4.0}
    pids_limit: 512

    # Harden container
    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    read_only: true

    tmpfs:
      - /tmp:size=2g,mode=1777

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:9005/api/health >/dev/null 2>&1 || exit 1"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: cortex-frontend

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "9005:80"

    restart: unless-stopped
    mem_limit: ${CORTEX_FRONTEND_MEM:-256m}
    cpus: ${CORTEX_FRONTEND_CPUS:-1.0}
    pids_limit: 128

    security_opt:
      - no-new-privileges:true

volumes:
  cortex-uploads:
  cortex-data:
